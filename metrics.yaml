# =========================================================================
# ALETHEIA19 - METRICS & SCALING SPECIFICATION (metrics.yaml)
# =========================================================================
# Format: YAML 1.2
# Reference Zenodo DOI: 10.5281/zenodo.21192234
# =========================================================================

metrology_rules:
  score_r:
    name: "Soil Grounding Ratio"
    definition: "Ratio of Soil invariants to Codex representation tokens."
    formula: "R = Sol_Tokens / (Sol_Tokens + Codex_Tokens)"
    bounds:
      grounded: "R >= 0.60"
      vigilance: "0.35 < R < 0.60"
      chimera: "R <= 0.35"

  loi_tau:
    name: "Multi-Layer Error Reduction"
    definition: "Multiplicative reduction of error rates across independent physical detection layers."
    formula: "P(Error_Global) = Product(P(Error_i)) for i in range(1, N)"

  single_lock:
    name: "Single Lock Trigger"
    definition: "A single critical diagnostic score >= 9/10 triggers a direct audit veto, bypassing the global average."
    target_diagnostics:
      - "D3_Neutralized_Immune_Response"
      - "D7_Hollow_Consensus"

  cistercian_decoupling_index:
    name: "Cistercian Decoupling & Friction Index"
    symbol: "chi"
    associated_diagnostic: "D6_Inverted_Fallow"
    definition: "Operational friction index derived from the algebraic connectivity of the coordination network G(V, E). It maps the second smallest eigenvalue (Fiedler value, lambda_2) of the Laplacian matrix L = D - A to the local autonomy margin."
    formula: "chi = 1 - (2 * lambda_2 / (lambda_2 + lambda_N))" # Normalizes spectral properties between 0 (sovereign decentralization) and 1 (Cluniac central stasis)
    bounds:
      sovereign_decentralized: "chi == 0" # Perfect balance: local nodes operate autonomously (Fiedler value is low but non-zero, preserving local jachere).
      administrative_creep: "0.0 < chi < 0.5" # Network algebraic connectivity is rising, propagating micro-management constraints.
      cognitive_capture: "chi >= 0.5" # The network is hyper-constrained (lambda_2 approaches the spectral radius lambda_N), local nodes lose all independent execution state.

  semantic_oxygen_ratio:
    name: "Semantic Oxygen Ratio / Asphyxiation Index"
    symbol: "omega"
    associated_diagnostic: "D5_Semantic_Oxygen_Debt"
    definition: "The ratio of unconstrained operational terms to the total vocabulary required to describe anomalous, failure, or crisis states."
    formula: "omega = V_unconstrained / (V_unconstrained + V_censored)"
    bounds:
      oxygenated: "omega >= 0.80" # The organization can freely name and respond to its failures.
      hypoxia: "0.50 < omega < 0.80" # Semantic suppression is active. Warnings are delayed or masked.
      asphyxiation: "omega <= 0.50" # Severe censorship. The system lacks the vocabulary to coordinate emergency response.

  temporal_asymmetry_index:
    name: "Temporal Asymmetry Index / Indice de Dissymétrie Temporelle"
    symbol: "D_t"
    associated_diagnostic: "D4_Temporal_Extraction"
    definition: "Quantifies the divergence between the velocity of symbolic model revision V_revision and the velocity of physical substrate renewal V_renewal."
    formula: "D_t = 1 - (V_renewal / V_revision)"
    bounds:
      synchronized: "D_t == 0.0" # Ideal coupling: the model updates at the exact speed of physical adaptation.
      coupled_tracking: "0.0 < D_t < 0.70" # The substrate has enough time to adapt to the model's instructions.
      chaotic_desynchronization: "D_t >= 0.70" # The model's revision rate outruns the physical time constant, leading to systemic decoupling and collapse.

inference_rules:
  R001_asphyxia_regime:
    name: "Transition to Asphyxiation Regime"
    condition: "D5_Semantic_Oxygen_Debt >= 0.80 AND D6_Inverted_Fallow >= 0.70"
    consequence: "Systemic hypoxia triggered. Critical operational signals are masked. Initiate emergency vocabulary restoration."
  
  R002_chimera_collapse:
    name: "Transition to Chimera Collapse"
    condition: "score_r <= 0.35 AND D1_Facade_Homeostasis >= 0.80"
    consequence: "Autophagous semantic loop active. Autonomy grounding (Sol) is lost. Trigger direct audit veto."

  R003_immune_neutralization:
    name: "Neutralization Veto Trigger"
    condition: "D3_Neutralized_Immune_Response >= 0.90 OR D7_Hollow_Consensus >= 0.90"
    consequence: "Immune warning vectors disabled. Bypassing global averages to execute direct veto protocol."

  R004_desynchronization_collapse:
    name: "Desynchronization Phase Transition"
    condition: "D_t >= 0.70 AND D5_Semantic_Oxygen_Debt >= 0.50"
    consequence: "Systemic desynchronization detected. The symbolic layer has decoupled from the substrate. Physical collapse (blackout/stasis) is imminent."
